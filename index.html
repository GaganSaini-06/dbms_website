<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        body::-webkit-scrollbar {
        display: none; /* Chrome, Safari */
        }
        body{
            margin: 0%;
        }
    </style>

</head>
<body>

    <iframe name="top" src="navbar.html" style="width: 100%; height: 70px; border: none; display: block;" scrolling="no"></iframe>

    <iframe name="bottom" src="home.html" style="width: 100%; height: calc(100vh - 70px); border: none; display: block;"></iframe>

</body>
</html>
